replicaCount: 1

image:
  repository: ghcr.io/nudgebee/forager
  pullPolicy: IfNotPresent
  # Empty tag falls back to .Chart.AppVersion (set by the release workflow
  # from the git tag). Override here or via --set image.tag=... to pin.
  tag: ''

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

serviceAccount:
  create: true
  annotations: {}
  name: ''

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

forager:
  relayURL: wss://relay.nudgebee.com/register
  accessKey: ''
  accessSecret: ''
  dataDir: /data
  signingPublicKey: ''

resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
annotations: {}
