name: Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        required: true

# Least privilege at the top; each job below escalates only what it needs.
# Keeps the OpenSSF Scorecard Token-Permissions check green.
permissions:
  contents: read

env:
  IMAGE: ghcr.io/nudgebee/forager
  CHART_REPO: oci://ghcr.io/nudgebee/charts
  # Existing customer endpoints. GHCR is the source of truth; the mirror
  # jobs below copy tagged releases to these so customers consuming
  # registry.nudgebee.com (which fronts ECR + S3) keep getting updates.
  # Sunset once all customers are migrated to ghcr.io/nudgebee/forager.
  #
  # AWS auth is GitHub OIDC -> assume role vars.AWS_ROLE_ARN. The role's
  # trust policy restricts assumption to refs/tags/v* on this repo only.
  # No long-lived AWS keys in repo secrets.
  #
  # Account ID, region, and bucket are repo variables (not source) so the
  # public repo doesn't leak infra identifiers, and forks can point the
  # mirror at their own AWS account. Required vars:
  #   vars.AWS_ACCOUNT_ID     vars.AWS_REGION
  #   vars.AWS_ROLE_ARN       vars.MIRROR_S3_BUCKET
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
  ECR_IMAGE_REPO: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nudgebee-forager
  S3_BUCKET: ${{ vars.MIRROR_S3_BUCKET }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)"

      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.7.2
          args: --timeout 10m

      - name: Test
        run: go test -race -cover ./...

  # Cross-compiled standalone binaries (CGO=0, no Oracle support).
  # Oracle support is Docker-only; see Dockerfile.
  build-binaries:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version metadata
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          VPKG=nudgebee/forager/pkg/version
          LDFLAGS="-s -w -X ${VPKG}.Version=${{ steps.v.outputs.version }} -X ${VPKG}.Commit=${{ steps.v.outputs.commit }} -X ${VPKG}.BuildTime=${{ steps.v.outputs.build_time }}"
          go build -ldflags "$LDFLAGS" \
            -o dist/nudgebee-forager-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/nudgebee-forager-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  # Docker image: linux/amd64 only for now.
  # The Dockerfile downloads Oracle Instant Client (x86_64-only zip),
  # so multi-arch via QEMU would produce a broken arm64 image. Tracked
  # as a follow-up after the Dockerfile picks the right OIC zip by arch.
  build-and-push-image:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # GHCR push
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build metadata
        id: buildmeta
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        id: meta
        with:
          images: ${{ env.IMAGE }}
          flavor: latest=auto
          tags: |
            type=ref,event=branch,suffix=-{{sha}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.buildmeta.outputs.commit }}
            BUILD_TIME=${{ steps.buildmeta.outputs.build_time }}
          provenance: false

  sign-image:
    needs: build-and-push-image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push cosign signature to GHCR
      id-token: write   # cosign keyless OIDC
    steps:
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cosign sign (keyless)
        run: cosign sign --yes ${{ env.IMAGE }}@${{ needs.build-and-push-image.outputs.digest }}

  sbom:
    needs: build-and-push-image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read    # pull image from GHCR to introspect
    steps:
      # syft pulls the image from GHCR to introspect; needs auth while
      # the GHCR package is private (will be public after repo flip).
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE }}@${{ needs.build-and-push-image.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.spdx.json

  publish-helm:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push Helm chart to GHCR
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Resolve chart version (strip leading 'v')
        id: v
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "chart_version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: GHCR login for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package & push chart
        env:
          CHART_VERSION: ${{ steps.v.outputs.chart_version }}
        run: |
          sed -i "s/^version:.*/version: ${CHART_VERSION}/" deploy/helm/forager/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${CHART_VERSION}\"/" deploy/helm/forager/Chart.yaml
          helm package deploy/helm/forager/
          helm push forager-${CHART_VERSION}.tgz ${{ env.CHART_REPO }}
          echo "Pushed ${{ env.CHART_REPO }}/forager:${CHART_VERSION}"

  github-release:
    needs: [build-binaries, build-and-push-image, sbom]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Release + tag refs
      id-token: write   # cosign keyless OIDC (sign release artifacts)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: dist

      - name: Stage install scripts alongside binaries
        run: |
          cp deploy/install.sh dist/install.sh
          cp deploy/install-macos.sh dist/install-macos.sh
          cp deploy/install.ps1 dist/install.ps1

      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Checksum and sign release artifacts
        working-directory: dist
        run: |
          # One checksum manifest over every release asset, then a keyless
          # cosign signature + certificate over that manifest. Verifiers
          # check the signature once and the checksums cover the rest.
          sha256sum * > checksums.txt
          cosign sign-blob --yes \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          # Mark as prerelease when the tag has a '-' suffix
          # (vX.Y.Z-rcN, -betaN, -alphaN, ...).
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
          files: |
            dist/*

  # ──────────────────────────────────────────────────────────────────
  # Mirror jobs — keep registry.nudgebee.com (ECR + S3 backed) in sync
  # with what we publish to GHCR/GitHub Releases. Tag pushes only.
  # Existing customers consuming these endpoints keep working.
  # Sunset once customers have migrated to GHCR.
  # ──────────────────────────────────────────────────────────────────

  mirror-image-to-ecr:
    needs: build-and-push-image
    # Skip prereleases (vX.Y.Z-anything) — they shouldn't overwrite
    # customer-facing :latest pointers at registry.nudgebee.com.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read    # pull image digest from GHCR
      id-token: write   # AWS OIDC role assumption
    steps:
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Install regctl
        run: |
          REGCTL_VERSION=v0.9.1
          curl -fsSL "https://github.com/regclient/regclient/releases/download/${REGCTL_VERSION}/regctl-linux-amd64" \
            -o /usr/local/bin/regctl
          chmod +x /usr/local/bin/regctl

      - name: Copy GHCR digest → ECR
        env:
          DIGEST: ${{ needs.build-and-push-image.outputs.digest }}
          VERSION: ${{ needs.build-and-push-image.outputs.version }}
        run: |
          regctl image copy "${IMAGE}@${DIGEST}" "${ECR_IMAGE_REPO}:${VERSION}"
          regctl image copy "${IMAGE}@${DIGEST}" "${ECR_IMAGE_REPO}:latest"
          echo "Mirrored to ${ECR_IMAGE_REPO}:${VERSION} and :latest"

  mirror-helm-to-ecr:
    needs: publish-helm
    # Skip prereleases — see mirror-image-to-ecr.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read    # pull chart from GHCR
      id-token: write   # AWS OIDC role assumption
    steps:
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Resolve chart version (strip leading 'v')
        id: v
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "chart_version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: GHCR login (helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: ECR login (helm)
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Pull chart from GHCR, push to ECR
        env:
          CHART_VERSION: ${{ steps.v.outputs.chart_version }}
        run: |
          helm pull ${{ env.CHART_REPO }}/forager --version "${CHART_VERSION}"
          helm push forager-${CHART_VERSION}.tgz oci://${{ env.ECR_REGISTRY }}
          echo "Mirrored chart to oci://${{ env.ECR_REGISTRY }}/forager:${CHART_VERSION}"

  mirror-binaries-to-s3:
    needs: build-binaries
    # Skip prereleases — see mirror-image-to-ecr.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # AWS OIDC role assumption
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true

      - name: Upload binaries + install scripts to S3
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Keep historical layout: /forager/{vX.Y.Z|X.Y.Z|latest}/<file>
          for V in "v${VERSION}" "${VERSION}" "latest"; do
            S3_PATH="s3://${S3_BUCKET}/forager/${V}"
            for f in dist/*; do
              FILENAME=$(basename "$f")
              aws s3 cp "$f" "${S3_PATH}/${FILENAME}" --content-type application/octet-stream
            done
            aws s3 cp deploy/install.sh "${S3_PATH}/install.sh" --content-type text/plain
            aws s3 cp deploy/install-macos.sh "${S3_PATH}/install-macos.sh" --content-type text/plain
            aws s3 cp deploy/install.ps1 "${S3_PATH}/install.ps1" --content-type text/plain
            echo "Mirrored binaries to ${S3_PATH}/"
          done
