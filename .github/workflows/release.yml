name: Release (Prod)

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.0)'
        required: true

env:
  ECR_REGISTRY: 740395098545.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO: 740395098545.dkr.ecr.us-east-1.amazonaws.com/nudgebee-forager
  S3_BUCKET: nudgebee-prod-documents
  AWS_REGION: us-east-1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Format check
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)"

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.7.2
          args: --timeout 10m

      - name: Test
        run: go test -race -cover ./...

  build-binaries:
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build -o dist/nudgebee-forager-linux-${{ matrix.goarch }} ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nudgebee-forager-linux-${{ matrix.goarch }}
          path: dist/nudgebee-forager-linux-${{ matrix.goarch }}

  upload-to-s3:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload binaries and install script to S3
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          for V in "${VERSION}" "latest"; do
            S3_PATH="s3://${S3_BUCKET}/forager/${V}"

            aws s3 cp dist/nudgebee-forager-linux-amd64/nudgebee-forager-linux-amd64 \
              "${S3_PATH}/nudgebee-forager-linux-amd64" --content-type application/octet-stream
            aws s3 cp dist/nudgebee-forager-linux-arm64/nudgebee-forager-linux-arm64 \
              "${S3_PATH}/nudgebee-forager-linux-arm64" --content-type application/octet-stream
            aws s3 cp deploy/install.sh \
              "${S3_PATH}/install.sh" --content-type text/plain

            echo "Uploaded to ${S3_PATH}/"
          done

  build-docker:
    runs-on: [self-hosted, X64]
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install AWS CLI
        run: |
          if ! command -v aws &> /dev/null; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -qo /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install --update
            rm -rf /tmp/awscliv2.zip /tmp/aws
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set image tag
        id: tag
        run: echo "tag=$(date +'%Y%m%d%H%M00')-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push amd64
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --provenance=false \
            -t ${{ env.ECR_REPO }}:${{ steps.tag.outputs.tag }}-amd64 \
            .

  build-docker-arm64:
    runs-on: [self-hosted, arm64]
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install AWS CLI
        run: |
          if ! command -v aws &> /dev/null; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o /tmp/awscliv2.zip
            unzip -qo /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install --update
            rm -rf /tmp/awscliv2.zip /tmp/aws
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Set image tag
        id: tag
        run: echo "tag=$(date +'%Y%m%d%H%M00')-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push arm64
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            --provenance=false \
            -t ${{ env.ECR_REPO }}:${{ steps.tag.outputs.tag }}-arm64 \
            .

  docker-manifest:
    runs-on: ubuntu-latest
    needs: [build-docker, build-docker-arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Set image tag
        id: tag
        run: echo "tag=$(date +'%Y%m%d%H%M00')-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create and push manifest
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          docker manifest create ${{ env.ECR_REPO }}:${TAG} \
            --amend ${{ env.ECR_REPO }}:${TAG}-amd64 \
            --amend ${{ env.ECR_REPO }}:${TAG}-arm64
          docker manifest push ${{ env.ECR_REPO }}:${TAG}

          docker manifest create ${{ env.ECR_REPO }}:latest \
            --amend ${{ env.ECR_REPO }}:${TAG}-amd64 \
            --amend ${{ env.ECR_REPO }}:${TAG}-arm64
          docker manifest push ${{ env.ECR_REPO }}:latest

  publish-helm:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR for Helm
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package and push Helm chart
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/forager/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/forager/Chart.yaml

          # Update image repo to prod ECR
          sed -i "s|864186153326.dkr.ecr.us-east-1.amazonaws.com|740395098545.dkr.ecr.us-east-1.amazonaws.com|" deploy/helm/forager/values.yaml

          helm package deploy/helm/forager/
          helm push nudgebee-forager-chart-${VERSION}.tgz oci://${{ env.ECR_REGISTRY }}
          echo "Pushed oci://${{ env.ECR_REGISTRY }}/nudgebee-forager-chart:${VERSION}"
