name: Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        required: true

permissions:
  contents: write   # GitHub Releases + tag refs
  packages: write   # GHCR push
  id-token: write   # cosign keyless OIDC

env:
  IMAGE: ghcr.io/nudgebee/forager
  CHART_REPO: oci://ghcr.io/nudgebee/charts

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Format check
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7.2
          args: --timeout 10m

      - name: Test
        run: go test -race -cover ./...

  # Cross-compiled standalone binaries (CGO=0, no Oracle support).
  # Oracle support is Docker-only; see Dockerfile.
  build-binaries:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Resolve version metadata
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          VPKG=nudgebee/forager/pkg/version
          LDFLAGS="-s -w -X ${VPKG}.Version=${{ steps.v.outputs.version }} -X ${VPKG}.Commit=${{ steps.v.outputs.commit }} -X ${VPKG}.BuildTime=${{ steps.v.outputs.build_time }}"
          go build -ldflags "$LDFLAGS" \
            -o dist/nudgebee-forager-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd

      - uses: actions/upload-artifact@v8
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/nudgebee-forager-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  # Docker image: linux/amd64 only for now.
  # The Dockerfile downloads Oracle Instant Client (x86_64-only zip),
  # so multi-arch via QEMU would produce a broken arm64 image. Tracked
  # as a follow-up after the Dockerfile picks the right OIC zip by arch.
  build-and-push-image:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build metadata
        id: buildmeta
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          flavor: latest=auto
          tags: |
            type=ref,event=branch,suffix=-{{sha}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.buildmeta.outputs.commit }}
            BUILD_TIME=${{ steps.buildmeta.outputs.build_time }}
          provenance: false

  sign-image:
    needs: build-and-push-image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: sigstore/cosign-installer@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cosign sign (keyless)
        run: cosign sign --yes ${{ env.IMAGE }}@${{ needs.build-and-push-image.outputs.digest }}

  sbom:
    needs: build-and-push-image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ needs.build-and-push-image.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - uses: actions/upload-artifact@v8
        with:
          name: sbom
          path: sbom.spdx.json

  publish-helm:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4

      - name: Resolve chart version (strip leading 'v')
        id: v
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "chart_version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: GHCR login for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package & push chart
        env:
          CHART_VERSION: ${{ steps.v.outputs.chart_version }}
        run: |
          sed -i "s/^version:.*/version: ${CHART_VERSION}/" deploy/helm/forager/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${CHART_VERSION}\"/" deploy/helm/forager/Chart.yaml
          helm package deploy/helm/forager/
          helm push nudgebee-forager-chart-${CHART_VERSION}.tgz ${{ env.CHART_REPO }}
          echo "Pushed ${{ env.CHART_REPO }}/nudgebee-forager-chart:${CHART_VERSION}"

  github-release:
    needs: [build-binaries, build-and-push-image, sbom]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          name: sbom
          path: sbom

      - name: Stage install scripts alongside binaries
        run: |
          cp deploy/install.sh dist/install.sh
          cp deploy/install-macos.sh dist/install-macos.sh
          cp deploy/install.ps1 dist/install.ps1

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            sbom/sbom.spdx.json
